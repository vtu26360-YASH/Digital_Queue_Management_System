<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SmartQueue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="app-body">
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>

    <div class="container py-4 py-lg-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <section class="glass-panel p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <span class="hero-badge">Admin Access</span>
                        <h1 class="h2 text-white mt-3 mb-2">Secure Dashboard Login</h1>
                        <p class="text-white-50 mb-0">Sign in to manage queue operations, analytics, and admin controls.</p>
                    </div>
                    <button id="themeToggle" class="btn btn-sm btn-light rounded-pill px-3" type="button">Dark Mode</button>
                </div>

                <form id="adminLoginForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label text-white-50" for="username">Username</label>
                        <input id="username" class="form-control form-control-lg custom-input" type="text" autocomplete="username" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-white-50" for="password">Password</label>
                        <input id="password" class="form-control form-control-lg custom-input" type="password" autocomplete="current-password" required>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary btn-lg w-100 smart-btn" type="submit">Login to Admin</button>
                    </div>
                </form>

                <div id="loginMessage" class="alert smart-alert mt-4 d-none"></div>

                <div class="mt-4 pt-2 d-flex justify-content-between align-items-center gap-3">
                    <a href="/" class="btn btn-sm btn-outline-light rounded-pill px-3">Back to User View</a>
                    <span class="text-white-50 small">Credentials are configured in Spring Boot.</span>
                </div>
            </section>
        </div>
    </div>

    <script src="/admin-login.js"></script>
</body>
</html>
